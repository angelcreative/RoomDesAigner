<script>
    
    
// Event listener para enviar el formulario
// Event listener para enviar el formulario
document.getElementById("virtualTryOnForm").addEventListener("submit", async (event) => {
  event.preventDefault();
  console.log("Formulario enviado");

  const modelImageFile = document.getElementById("modelImage").files[0];
  const clothImageInput = document.getElementById("clothImage");
  const clothType = document.querySelector('input[name="clothType"]:checked')?.value;
  const prompt = document.getElementById("prompt").value.trim();
  const resultDiv = document.getElementById("result");
  
  let clothImageUrl;

  // Verificar modelo y prompt
 // if (!modelImageFile || !clothType || !prompt) {
    //alert("Model image, cloth type and prompt are required!");
    //return;
  //}

  try {
    // Mostrar mensaje de carga
    resultDiv.innerHTML = "<p>Processing your image... Please wait.</p>";

    // Subir imagen del modelo a ImgBB
    console.log("Subiendo imagen del modelo a ImgBB...");
    const modelImageUrl = await uploadToImgBB(modelImageFile);
    console.log("Imagen del modelo subida correctamente:", modelImageUrl);

    // Determinar la URL de la prenda
    if (clothImageInput.files.length > 0) {
      // Si hay una imagen subida, usarla
      clothImageUrl = await uploadToImgBB(clothImageInput.files[0]);
    } else if (window.selectedClothImage) {
      // Usar la imagen seleccionada del carousel
      clothImageUrl = window.selectedClothImage;
    } else {
      alert("Please select a cloth image or upload one!");
      return;
    }

    console.log("Imagen de la prenda lista:", clothImageUrl);

    // Crear el payload para el backend
    const requestBody = {
      init_image: modelImageUrl,
      cloth_image: clothImageUrl,
      cloth_type: clothType,
      prompt: "a cozy xmas sweater",
      negative_prompt: "low quality, unrealistic",
      guidance_scale: 15,
      num_inference_steps: 21,
    };

    console.log("Enviando solicitud al backend con payload:", requestBody);

    // Enviar al backend
    const response = await fetch("/api/virtual-try-on", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(requestBody),
    });

    if (!response.ok) {
      throw new Error("Failed to contact the backend.");
    }

    const data = await response.json();
    console.log("Respuesta del backend recibida:", data);

    if (data.status === "processing" && data.fetch_result) {
      console.log("Iniciando polling para verificar el estado...");
      pollForResult(data.fetch_result);
    } else if (data.status === "success" && data.proxy_links && data.proxy_links.length > 0) {
      console.log("Imagen generada correctamente:", data.proxy_links[0]);
      showGeneratedImage(data.proxy_links[0]);
    } else {
      throw new Error("Failed to generate the try-on image. Please check the API response.");
    }
  } catch (error) {
    console.error("Error en virtual try-on:", error);
    resultDiv.innerHTML = `<p>Error: ${error.message}</p>`;
  }
});

// Función para mostrar la vista previa de una imagen seleccionada
function previewImage(file, type) {
  const reader = new FileReader();
  reader.onload = function (e) {
    const thumbnailsDiv = document.getElementById("thumbnails");
    
    // Buscar el contenedor existente para el tipo de imagen
    let existingThumbnail = document.querySelector(`#thumbnails .thumbnail-${type}`);
    
    // Si ya existe una miniatura para este tipo, reemplazarla
    if (existingThumbnail) {
      existingThumbnail.innerHTML = `
<p  class="text-sm text-gray-600 mt-2">${type === "model" ? "Model Image" : "Cloth Image"}</p>
        <img src="${e.target.result}" alt="${type} thumbnail" style="max-width: 150px; height: auto; border: 1px solid #ddd; border-radius:12px;">
        
      `;
    } else {
      // Si no existe, crear un nuevo contenedor
      const thumbnailHtml = `
        <div class="thumbnail-${type}" style="display: inline-block; text-align: center;">
<p  class="text-sm text-gray-600 mt-2">${type === "model" ? "Model Image" : "Cloth Image"}</p>
          <img src="${e.target.result}" alt="${type} thumbnail" style="max-width: 150px; height: auto; border: 1px solid #ddd;  border-radius:12px;">
          
        </div>
      `;
      thumbnailsDiv.innerHTML += thumbnailHtml;
    }
  };
  reader.readAsDataURL(file);
}

// Event listeners para generar vistas previas cuando el usuario selecciona imágenes
document.getElementById("modelImage").addEventListener("change", (event) => {
  const file = event.target.files[0];
  if (file) {
    previewImage(file, "model");
  }
});

document.getElementById("clothImage").addEventListener("change", (event) => {

  if (file) {

});

    
    
// Función para realizar polling en fetch_result hasta que la imagen esté lista
async function pollForResult(fetchUrl) {
  const resultDiv = document.getElementById("result");

  try {
    // Configurar el cuerpo de la solicitud para el endpoint de fetch
    const requestBody = {
      key: "X0qYOcbNktuRv1ri0A8VK1WagXs9vNjpEBLfO8SnRRQhN0iWym8pOrH1dOMw", // Clave de ModelsLab
    };

    const response = await fetch(fetchUrl, {
      method: "POST", // Cambiar de GET a POST
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(requestBody), // Asegurar que se envíe un cuerpo, aunque sea vacío
    });

    if (!response.ok) {
      throw new Error(`Error while fetching result: ${response.statusText}`);
    }

    const data = await response.json();

    if (data.status === "success" && data.proxy_links && data.proxy_links.length > 0) {
      showGeneratedImage(data.proxy_links[0]); // Mostrar la imagen generada
    } else if (data.status === "processing") {
      // Si sigue procesando, esperar 5 segundos antes de intentarlo de nuevo
      setTimeout(() => pollForResult(fetchUrl), 5000);
    } else {
      throw new Error("Failed to fetch the completed try-on image. Please check the API response.");
    }
  } catch (error) {
    console.error("Error while polling for result:", error);
    resultDiv.innerHTML = `<p>Error while processing: ${error.message}</p>`;
  }
}


// Función para mostrar la imagen generada
function showGeneratedImage(imageUrl) {
  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = `
   
    <img src="${imageUrl}" alt="Generated Image" style="max-width: 100%; height: auto;">
  `;
}

// Función para subir una imagen a ImgBB
async function uploadToImgBB(file) {
  const apiKey = "ba238be3f3764905b1bba03fc7a22e28"; // Reemplaza con tu clave de ImgBB
  const uploadUrl = "https://api.imgbb.com/1/upload";
  const formData = new FormData();
  formData.append("key", apiKey);
  formData.append("image", file);

  const response = await fetch(uploadUrl, {
    method: "POST",
    body: formData,
  });

  if (!response.ok) {
    throw new Error("Failed to upload the image to ImgBB.");
  }

  const data = await response.json();

  if (data.success) {
    return data.data.url;
  } else {
    throw new Error("Error uploading image to ImgBB");
  }
}
    

document.addEventListener('DOMContentLoaded', () => {
    const carousel = document.querySelector('.carousel');
    const track = document.querySelector('.carousel-track');
    const leftNav = document.querySelector('.carousel-nav.left');
    const rightNav = document.querySelector('.carousel-nav.right');
    
    // Obtener las imágenes originales
    const images = track.querySelectorAll('img');
    
    // Crear clones al inicio y al final para un scroll infinito más suave
    const firstClone = images[0].cloneNode(true);
    const lastClone = images[images.length - 1].cloneNode(true);
    track.appendChild(firstClone);
    track.insertBefore(lastClone, images[0]);

    // Calcular el ancho total
    const updateTrackWidth = () => {
        const imageWidth = images[0].offsetWidth;
        const gap = 16;
        const totalWidth = (imageWidth + gap) * (images.length + 2); // +2 por los clones
        track.style.width = `${totalWidth}px`;
        
        // Posicionar inicialmente en la primera imagen real (después del clon)
        track.scrollLeft = imageWidth + gap;
    };

    updateTrackWidth();
    window.addEventListener('resize', updateTrackWidth);

    // Manejar clicks en las imágenes
    track.addEventListener('click', (e) => {
        if (e.target.tagName === 'IMG') {
            const clickedSrc = e.target.src;
            
            track.querySelectorAll('img').forEach(img => {
                img.classList.remove('selected');
                if (img.src === clickedSrc) {
                    img.classList.add('selected');
                }
            });

            updateThumbnail(clickedSrc);
            window.selectedClothImage = clickedSrc;
            document.getElementById("clothImage").value = '';
        }
    });

    // Función mejorada para mover el carrusel
    const moveCarousel = (direction) => {
        const imageWidth = images[0].offsetWidth + 16; // Ancho de imagen + gap
        const currentScroll = track.scrollLeft;
        
        let newScroll = direction === 'left' 
            ? currentScroll - imageWidth 
            : currentScroll + imageWidth;

        track.scrollTo({
            left: newScroll,
            behavior: 'smooth'
        });

        // Verificar y ajustar la posición después del scroll
        setTimeout(() => {
            // Si llegamos al clon del final, saltar al inicio real
            if (currentScroll >= (track.scrollWidth - track.clientWidth - 10)) {
                track.scrollTo({ left: imageWidth, behavior: 'auto' });
            }
            // Si llegamos al clon del inicio, saltar al final real
            else if (currentScroll <= 10) {
                track.scrollTo({ 
                    left: track.scrollWidth - track.clientWidth - imageWidth * 2, 
                    behavior: 'auto' 
                });
            }
        }, 300); // Esperar a que termine la animación de scroll
    };

    leftNav.addEventListener('click', () => moveCarousel('left'));
    rightNav.addEventListener('click', () => moveCarousel('right'));
});
 
// Función unificada para actualizar thumbnail
function updateThumbnail(imgSrc) {
    const thumbnailsDiv = document.getElementById("thumbnails");
    const thumbnailHtml = `
        <div class="thumbnail-cloth text-center">
<p class="text-sm text-gray-600 mt-2">Selected sweater</p>
            <img src="${imgSrc}" alt="Cloth thumbnail" class="max-w-[150px] h-auto border border-gray-200 rounded-lg">
            
        </div>
    `;
    
    const existingThumbnail = thumbnailsDiv.querySelector('.thumbnail-cloth');
    if (existingThumbnail) {
        existingThumbnail.innerHTML = thumbnailHtml;
    } else {
        thumbnailsDiv.innerHTML = thumbnailHtml;
    }
}
