<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Try-On</title>
</head>
<body>
  <form id="virtualTryOnForm">
    <h2>Virtual Try-On</h2>
    
    <label for="initImage">Model Image:</label>
    <input type="file" id="initImage" accept="image/*" required>

    <label for="clothImage">Cloth Image:</label>
    <input type="file" id="clothImage" accept="image/*" required>

    <fieldset>
      <legend>Cloth Type:</legend>
      <label><input type="radio" name="clothType" value="upper_body" required> Upper Body</label>
      <label><input type="radio" name="clothType" value="lower_body" required> Lower Body</label>
      <label><input type="radio" name="clothType" value="dresses" required> Dresses</label>
    </fieldset>

    <label for="prompt">Prompt:</label>
    <textarea id="prompt" placeholder="Describe the generated image" required></textarea>

    <label for="negativePrompt">Negative Prompt:</label>
    <textarea id="negativePrompt" placeholder="What you don't want"></textarea>

    <label for="numSteps">Inference Steps:</label>
    <select id="numSteps">
      <option value="21">21</option>
      <option value="31">31</option>
      <option value="41">41</option>
    </select>

    <label for="guidanceScale">Guidance Scale:</label>
    <input type="number" id="guidanceScale" min="1" max="20" step="0.1" value="7.5">

    <button type="submit">Generate</button>
  </form>

  <div id="result"></div>

  <script>
    async function uploadToImgBB(file) {
      const apiKey = "ba238be3f3764905b1bba03fc7a22e28"; // Reemplaza con tu clave ImgBB
      const uploadUrl = "https://api.imgbb.com/1/upload";
      const formData = new FormData();
      formData.append("key", apiKey);
      formData.append("image", file);

      const response = await fetch(uploadUrl, {
        method: "POST",
        body: formData,
      });
      const data = await response.json();
      if (data.success) {
        return data.data.url;
      } else {
        throw new Error("Error al subir la imagen a ImgBB");
      }
    }

    document.getElementById("virtualTryOnForm").addEventListener("submit", async (event) => {
      event.preventDefault();

      const initImageFile = document.getElementById("initImage").files[0];
      const clothImageFile = document.getElementById("clothImage").files[0];
      const clothType = document.querySelector("input[name='clothType']:checked").value;
      const prompt = document.getElementById("prompt").value.trim();
      const negativePrompt = document.getElementById("negativePrompt").value.trim();
      const numSteps = document.getElementById("numSteps").value;
      const guidanceScale = document.getElementById("guidanceScale").value;

      try {
        // Subir imágenes a ImgBB
        const initImageUrl = await uploadToImgBB(initImageFile);
        const clothImageUrl = await uploadToImgBB(clothImageFile);

        // Crear el payload
        const payload = {
          init_image_url: initImageUrl,
          cloth_image_url: clothImageUrl,
          cloth_type: clothType,
          prompt,
          negative_prompt: negativePrompt,
          num_steps: numSteps,
          guidance_scale: guidanceScale,
        };

        // Enviar los datos al backend
        const response = await fetch("/virtual-try-on", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });

        const result = await response.json();
        if (result.status === "success") {
          document.getElementById("result").innerHTML = `
            <h3>Generated Image:</h3>
            <img src="${result.generated_image}" alt="Generated Image">
          `;
        } else {
          document.getElementById("result").innerHTML = `<p>Error: ${result.error}</p>`;
        }
      } catch (error) {
        console.error("Error:", error);
        document.getElementById("result").innerHTML = `<p>Error: ${error.message}</p>`;
      }
    });
  </script>
</body>
</html>
