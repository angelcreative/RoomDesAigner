<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Try-On</title>
</head>
<body>
  <form id="virtualTryOnForm">
    <h2>Virtual Try-On</h2>

    <label for="modelImage">Model Image:</label>
    <input type="file" id="modelImage" accept="image/*" required>

    <label for="clothImage">Cloth Image:</label>
    <input type="file" id="clothImage" accept="image/*" required>

    <fieldset>
      <legend>Cloth Type:</legend>
      <label><input type="radio" name="clothType" value="upper_body" required> Upper Body</label>
      <label><input type="radio" name="clothType" value="lower_body" required> Lower Body</label>
      <label><input type="radio" name="clothType" value="dresses" required> Dresses</label>
    </fieldset>

    <label for="prompt">Prompt:</label>
    <textarea id="prompt" placeholder="Describe the generated image" required></textarea>

    <button type="submit">Generate</button>
  </form>

  <!-- Div para mostrar el resultado -->
  <div id="result"></div>

<script>
document.getElementById("virtualTryOnForm").addEventListener("submit", async (event) => {
  event.preventDefault(); // Evita que el formulario realice un envío GET por defecto

  const modelImageFile = document.getElementById("modelImage").files[0];
  const clothImageFile = document.getElementById("clothImage").files[0];
  const clothType = document.querySelector('input[name="clothType"]:checked').value;
  const prompt = document.getElementById("prompt").value.trim();
  const resultDiv = document.getElementById("result");

  if (!modelImageFile || !clothImageFile || !clothType || !prompt) {
    alert("All fields are required!");
    return;
  }

  try {
    // Mostrar un mensaje de carga
    resultDiv.innerHTML = "<p>Processing your image... Please wait.</p>";

    // Subir imágenes a ImgBB
    const modelImageUrl = await uploadToImgBB(modelImageFile);
    const clothImageUrl = await uploadToImgBB(clothImageFile);

    // Crear el payload para enviar al backend
    const requestBody = {
      init_image: modelImageUrl,
      cloth_image: clothImageUrl,
      cloth_type: clothType,
      prompt,
      negative_prompt: "low quality, unrealistic",
      guidance_scale: 10,
      num_inference_steps: 21,
    };

    // Enviar al backend
    const response = await fetch("/api/virtual-try-on", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(requestBody),
    });

    if (!response.ok) {
      throw new Error("Failed to contact the backend.");
    }

    const data = await response.json();

    if (data.status === "processing" && data.fetch_result) {
      // Iniciar polling para verificar si la imagen está lista
      pollForResult(data.fetch_result);
    } else if (data.status === "success" && data.proxy_links && data.proxy_links.length > 0) {
      showGeneratedImage(data.proxy_links[0]);
    } else {
      throw new Error("Failed to generate the try-on image. Please check the API response.");
    }
  } catch (error) {
    console.error("Error in virtual try-on:", error);
    resultDiv.innerHTML = `<p>Error: ${error.message}</p>`;
  }
});

// Función para realizar polling en fetch_result hasta que la imagen esté lista
async function pollForResult(fetchUrl) {
  const resultDiv = document.getElementById("result");

  try {
    // Configurar el cuerpo de la solicitud para el endpoint de fetch
    const requestBody = {
      key: "X0qYOcbNktuRv1ri0A8VK1WagXs9vNjpEBLfO8SnRRQhN0iWym8pOrH1dOMw", // Clave de ModelsLab
    };

    const response = await fetch(fetchUrl, {
      method: "POST", // Cambiar de GET a POST
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(requestBody), // Asegurar que se envíe un cuerpo, aunque sea vacío
    });

    if (!response.ok) {
      throw new Error(`Error while fetching result: ${response.statusText}`);
    }

    const data = await response.json();

    if (data.status === "success" && data.proxy_links && data.proxy_links.length > 0) {
      showGeneratedImage(data.proxy_links[0]); // Mostrar la imagen generada
    } else if (data.status === "processing") {
      // Si sigue procesando, esperar 5 segundos antes de intentarlo de nuevo
      setTimeout(() => pollForResult(fetchUrl), 5000);
    } else {
      throw new Error("Failed to fetch the completed try-on image. Please check the API response.");
    }
  } catch (error) {
    console.error("Error while polling for result:", error);
    resultDiv.innerHTML = `<p>Error while processing: ${error.message}</p>`;
  }
}


// Función para mostrar la imagen generada
function showGeneratedImage(imageUrl) {
  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = `
    <h3>Generated Image:</h3>
    <img src="${imageUrl}" alt="Generated Image" style="max-width: 100%; height: auto;">
  `;
}

// Función para subir una imagen a ImgBB
async function uploadToImgBB(file) {
  const apiKey = "ba238be3f3764905b1bba03fc7a22e28"; // Reemplaza con tu clave de ImgBB
  const uploadUrl = "https://api.imgbb.com/1/upload";
  const formData = new FormData();
  formData.append("key", apiKey);
  formData.append("image", file);

  const response = await fetch(uploadUrl, {
    method: "POST",
    body: formData,
  });

  if (!response.ok) {
    throw new Error("Failed to upload the image to ImgBB.");
  }

  const data = await response.json();

  if (data.success) {
    return data.data.url;
  } else {
    throw new Error("Error uploading image to ImgBB");
  }
}
    
    
</script>
</body>
</html>
