<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Try-On</title>
</head>
<body>
  <form id="virtualTryOnForm">
    <h2>Virtual Try-On</h2>
    
    <label for="initImageUrl">Model Image URL:</label>
    <input type="text" id="initImageUrl" placeholder="Enter URL" required>

    <label for="clothImageUrl">Cloth Image URL:</label>
    <input type="text" id="clothImageUrl" placeholder="Enter URL" required>

    <fieldset>
      <legend>Cloth Type:</legend>
      <label><input type="radio" name="clothType" value="upper_body" required> Upper Body</label>
      <label><input type="radio" name="clothType" value="lower_body" required> Lower Body</label>
      <label><input type="radio" name="clothType" value="dresses" required> Dresses</label>
    </fieldset>

    <label for="prompt">Prompt:</label>
    <textarea id="prompt" placeholder="Describe the generated image"></textarea>

    <label for="negativePrompt">Negative Prompt:</label>
    <textarea id="negativePrompt" placeholder="What you don't want"></textarea>

    <label for="numSteps">Inference Steps:</label>
    <select id="numSteps">
      <option value="21">21</option>
      <option value="31">31</option>
      <option value="41">41</option>
    </select>

    <label for="guidanceScale">Guidance Scale:</label>
    <input type="number" id="guidanceScale" min="1" max="20" step="0.1" value="7.5">

    <button type="submit">Generate</button>
  </form>

  <div id="result"></div>

  <script>
    document.getElementById("virtualTryOnForm").addEventListener("submit", async (event) => {
      event.preventDefault();

      const formData = new FormData();
      formData.append("init_image_url", document.getElementById("initImageUrl").value.trim());
      formData.append("cloth_image_url", document.getElementById("clothImageUrl").value.trim());
      formData.append("cloth_type", document.querySelector("input[name='clothType']:checked").value);
      formData.append("prompt", document.getElementById("prompt").value.trim());
      formData.append("negative_prompt", document.getElementById("negativePrompt").value.trim());
      formData.append("num_steps", document.getElementById("numSteps").value);
      formData.append("guidance_scale", document.getElementById("guidanceScale").value);

      try {
        const response = await fetch("/virtual-try-on", {
          method: "POST",
          body: formData,
        });
        const result = await response.json();

        if (result.status === "success") {
          document.getElementById("result").innerHTML = `
            <h3>Generated Image:</h3>
            <img src="${result.generated_image}" alt="Generated Image">
          `;
        } else {
          document.getElementById("result").innerHTML = `<p>Error: ${result.error}</p>`;
        }
      } catch (error) {
        console.error("Error:", error);
        document.getElementById("result").innerHTML = `<p>Error: ${error.message}</p>`;
      }
    });
  </script>
</body>
</html>
