    <script>
        const IMGBB_API_KEY = "ba238be3f3764905b1bba03fc7a22e28"; // Replace with your ImgBB API Key
        const MODEL_LAB_API_KEY = "X0qYOcbNktuRv1ri0A8VK1WagXs9vNjpEBLfO8SnRRQhN0iWym8pOrH1dOMw"; // Replace with your Modelslab API Key
        const MODEL_LAB_URL = "https://modelslab.com/api/v5/controlnet";

        const form = document.getElementById("baby-face-form");
        const resultDiv = document.getElementById("result");
        const loadingText = document.getElementById("loading-text");
        const babyImage = document.getElementById("baby-image");

        async function resizeImage(file, size = 512) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;

                    img.onload = () => {
                        const canvas = document.createElement("canvas");
                        canvas.width = size;
                        canvas.height = size;
                        const ctx = canvas.getContext("2d");
                        ctx.drawImage(img, 0, 0, size, size);

                        canvas.toBlob((blob) => resolve(blob), "image/jpeg", 0.9);
                    };

                    img.onerror = reject;
                };

                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function uploadToImgBB(imageBlob) {
            const formData = new FormData();
            formData.append("key", IMGBB_API_KEY);
            formData.append("image", imageBlob);

            const response = await fetch("https://api.imgbb.com/1/upload", {
                method: "POST",
                body: formData,
            });

            if (response.ok) {
                const data = await response.json();
                return data.data.url;
            } else {
                throw new Error("Error uploading to ImgBB");
            }
        }

        async function pollForResult(fetchUrl) {
            try {
                const response = await fetch(fetchUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ key: MODEL_LAB_API_KEY }),
                });

                if (!response.ok) {
                    throw new Error(`Polling failed: ${response.statusText}`);
                }

                const data = await response.json();

                if (data.status === "success" && data.links && data.links.length > 0) {
                    loadingText.style.display = "none";
                    babyImage.src = data.links[0];
                    babyImage.style.display = "block";
                } else if (data.status === "processing") {
                    setTimeout(() => pollForResult(fetchUrl), 5000); // Retry after 5 seconds
                } else {
                    throw new Error("Failed to generate the image. Check the API response.");
                }
            } catch (error) {
                console.error("Error polling for result:", error);
                loadingText.textContent = `Error: ${error.message}`;
            }
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const husbandPhoto = document.getElementById("husband").files[0];
            const wifePhoto = document.getElementById("wife").files[0];
            const gender = document.querySelector('input[name="gender"]:checked').value;

            try {
                const [resizedHusband, resizedWife] = await Promise.all([
                    resizeImage(husbandPhoto, 512),
                    resizeImage(wifePhoto, 512),
                ]);

                const [husbandUrl, wifeUrl] = await Promise.all([
                    uploadToImgBB(resizedHusband),
                    uploadToImgBB(resizedWife),
                ]);

                const prompt = `A realistic portrait of a ${gender} newborn. blending features of two parents. The ${gender} newborn has round cheeks, soft skin, large bright eyes, a small button nose, and smooth, newborn proportions. The image should be photorealistic, capturing the innocence and playful expression typical of a child of this age`;

                const payload = {
                    key: MODEL_LAB_API_KEY,
                    model_id: "realisticvisionv60b1v60b1",
                    controlnet_model: "canny",
                    controlnet_type: "canny",
                    negative_prompt: "beard, facial hair, glasses, sunglasses, wrinkles, scars, asymmetry, blurry, extra facial features, distorted, low quality, imperfections, blemishes, acne, spots",
                    init_image: husbandUrl,
                    ip_adapter_id: "ip-adapter_sd15",
                    ip_adapter_image: wifeUrl,
                    ip_adapter_scale: 0.5,
                    prompt: prompt,
                    width: 512,
                    height: 512,
                    samples: 1,
                    scheduler: "EulerDiscreteScheduler",
                    steps: 20,
                    guidance: 8,
                    strength: 1,
                    controlnet_conditioning_scale: 0.6,
                    safety_checker: "no",
                };

                const response = await fetch(MODEL_LAB_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                });

                const data = await response.json();

                if (data.status === "success" && data.links && data.links.length > 0) {
                    babyImage.src = data.links[0];
                    babyImage.style.display = "block";
                    loadingText.style.display = "none";
                } else if (data.fetch_url) {
                    loadingText.style.display = "block";
                    pollForResult(data.fetch_url);
                } else {
                    throw new Error("Failed to generate the image. No valid fetch_url or links provided.");
                }
            } catch (error) {
                console.error("Error generating baby face:", error);
                alert(`Error: ${error.message}`);
            }
        });
    </script>
