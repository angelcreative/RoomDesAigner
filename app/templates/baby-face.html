<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Face Generator</title>
</head>
<body>
    <form id="baby-face-form" enctype="multipart/form-data">
        <div>
            <label for="husband">Upload dad's picture:</label>
            <input type="file" id="husband" name="husband" accept="image/*" required>
        </div>
        <div>
            <label for="wife">Upload mom's picture:</label>
            <input type="file" id="wife" name="wife" accept="image/*" required>
        </div>
        <div>
            <input type="radio" id="girl" name="gender" value="girl" required>
            <label for="girl">It's a girl</label>
            <input type="radio" id="boy" name="gender" value="boy" required>
            <label for="boy">It's a boy</label>
        </div>
        <div>
            <label for="custom-prompt">Add a custom touch to the prompt:</label>
            <textarea id="custom-prompt" placeholder="Add additional details for the baby's appearance or environment"></textarea>
        </div>
        <button type="submit">Generate Baby Face</button>
    </form>

    <div id="result" style="display: none;">
        <p id="loading-text">Generating the baby face...</p>
        <img id="baby-image" src="" alt="Baby Face" style="display: none;">
    </div>

    <script>
        const IMGBB_API_KEY = "ba238be3f3764905b1bba03fc7a22e28";
        const BACKEND_API_URL = "/generate-baby-face";

        const form = document.getElementById('baby-face-form');
        const resultDiv = document.getElementById('result');
        const babyImage = document.getElementById('baby-image');

        async function resizeImage(file, size = 512) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;

                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = size;
                        canvas.height = size;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, size, size);

                        canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.9);
                    };

                    img.onerror = reject;
                };

                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function uploadToImgBB(imageBlob) {
            const formData = new FormData();
            formData.append('key', IMGBB_API_KEY);
            formData.append('image', imageBlob);

            const response = await fetch('https://api.imgbb.com/1/upload', {
                method: 'POST',
                body: formData,
            });

            if (response.ok) {
                const data = await response.json();
                return data.data.url;
            } else {
                throw new Error('Error al subir la imagen a ImgBB');
            }
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const husbandPhoto = document.getElementById("husband").files[0];
            const wifePhoto = document.getElementById("wife").files[0];
            const gender = document.querySelector('input[name="gender"]:checked').value;
            const custom = document.getElementById("custom-prompt").value.trim();

            if (!husbandPhoto || !wifePhoto) {
                alert("Por favor, selecciona ambas fotos.");
                return;
            }

            try {
                // Mostrar estado de carga
                resultDiv.style.display = "block";
                const loadingText = document.getElementById("loading-text");
                loadingText.style.display = "block";
                loadingText.textContent = "Procesando imágenes...";
                babyImage.style.display = "none";

                // Redimensionar y subir imágenes
                const [resizedHusband, resizedWife] = await Promise.all([
                    resizeImage(husbandPhoto, 512),
                    resizeImage(wifePhoto, 512),
                ]);

                const [husbandUrl, wifeUrl] = await Promise.all([
                    uploadToImgBB(resizedHusband),
                    uploadToImgBB(resizedWife),
                ]);

                const prompt = `
                    A realistic portrait blending features of two parents. 
                    The subject has a youthful, delicate face with round cheeks, soft and smooth skin, large bright eyes, 
                    a small button nose, and harmonious proportions typical of a newborn ${gender}. 
                    The image should be photorealistic, capturing the innocence, curiosity, and playful expression characteristic of this age. 
                    (${custom}) [rich and vibrant skin tones::2, culturally accurate facial features::1.5, and contextually appropriate details]. 
                    (${gender})
                `;

                loadingText.textContent = "Generando la imagen del bebé...";

                const payload = {
                    husband_url: husbandUrl,
                    wife_url: wifeUrl,
                    prompt: prompt,
                    model_id: "realisticvisionv60b1v60b1",
                    controlnet_model: "canny",
                    check_status: false
                };

                // Enviar la solicitud al backend
                const response = await fetch(BACKEND_API_URL, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "Accept": "application/json"
                    },
                    body: JSON.stringify(payload),
                });

                // Verificar si la respuesta es exitosa
                if (!response.ok) {
                    throw new Error(`Error del servidor: ${response.status}`);
                }

                // Procesar la respuesta JSON
                const data = await response.json();
                console.log("Respuesta inicial:", data); // Para debugging

                // Si la respuesta contiene enlaces a las imágenes generadas
                if (data.links && data.links.length > 0) {
                    loadingText.style.display = "none";
                    babyImage.src = data.links[0];
                    babyImage.style.display = "block";
                } 
                // Si el estado es "queued" o "processing", iniciar el polling
                else if (data.status === "queued" || data.status === "processing") {
                    loadingText.textContent = "Imagen en cola, por favor espere...";
                    await pollForResult(BACKEND_API_URL, payload);
                }
                // Si no se recibe una respuesta válida, lanzar un error
                else {
                    throw new Error("No se recibió una respuesta válida del servidor");
                }

            } catch (error) {
                console.error("Error en la generación:", error);
                const loadingText = document.getElementById("loading-text");
                loadingText.textContent = `Error: ${error.message}. Por favor, intenta nuevamente.`;
                loadingText.style.color = "red";
            }
        });

        async function pollForResult(fetchUrl, originalPayload) {
            const loadingText = document.getElementById('loading-text');
            const maxAttempts = 180; // 15 minutos máximo (180 intentos * 5 segundos)
            let attempts = 0;

            while (attempts < maxAttempts) {
                try {
                    const response = await fetch(fetchUrl, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Accept": "application/json"
                        },
                        body: JSON.stringify({
                            check_status: true,
                            ...originalPayload
                        }),
                    });

                    if (!response.ok) {
                        throw new Error(`Error del servidor: ${response.status}`);
                    }

                    const data = await response.json();
                    attempts++;

                    // Verificar si tenemos links en la respuesta
                    if (data.links && data.links.length > 0) {
                        loadingText.style.display = "none";
                        babyImage.src = data.links[0];
                        babyImage.style.display = "block";
                        return;
                    }

                    // Verificar el estado
                    if (data.status === "queued" || data.status === "processing") {
                        loadingText.textContent = `Generando imagen... ${Math.min(Math.round((attempts / maxAttempts) * 100), 99)}%`;
                        await new Promise(resolve => setTimeout(resolve, 5000));
                        continue;
                    }

                    if (data.status === "failed") {
                        throw new Error(data.error || "La generación de imagen falló");
                    }

                } catch (error) {
                    console.error("Error en polling:", error);
                    loadingText.textContent = `Error: ${error.message}`;
                    break;
                }
            }

            if (attempts >= maxAttempts) {
                loadingText.textContent = "Tiempo de espera agotado. Por favor, intenta nuevamente.";
            }
        }

        // Event listeners para las previsualizaciones de imágenes
        document.getElementById('husband').addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('father-preview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('wife').addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('mother-preview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
