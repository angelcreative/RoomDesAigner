    <script>
    
    const IMGBB_API_KEY = "ba238be3f3764905b1bba03fc7a22e28"; // Clave de ImgBB
const BACKEND_API_URL = "/generate-baby-face"; // Endpoint del backend

const form = document.getElementById('baby-face-form');
const resultDiv = document.getElementById('result');
const babyImage = document.getElementById('baby-image');

// Función para redimensionar una imagen a 512x512
async function resizeImage(file, size = 512) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;

            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;

                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, size, size);

                canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.9);
            };

            img.onerror = reject;
        };

        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

// Función para subir la imagen a ImgBB y obtener la URL
async function uploadToImgBB(imageBlob) {
    const formData = new FormData();
    formData.append('key', IMGBB_API_KEY);
    formData.append('image', imageBlob);

    const response = await fetch('https://api.imgbb.com/1/upload', {
        method: 'POST',
        body: formData,
    });

    if (response.ok) {
        const data = await response.json();
        return data.data.url;
    } else {
        throw new Error('Error al subir la imagen a ImgBB');
    }
}

// Función para realizar polling hasta que la imagen esté lista
async function pollForResult(fetchUrl) {
    const loadingText = document.getElementById('loading-text');
    const babyImage = document.getElementById('baby-image');

    try {
        const requestBody = {
            key: "X0qYOcbNktuRv1ri0A8VK1WagXs9vNjpEBLfO8SnRRQhN0iWym8pOrH1dOMw", // Clave de ModelsLab
        };

        const response = await fetch(fetchUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify(requestBody),
        });

        if (!response.ok) {
            throw new Error(`Error while fetching result: ${response.statusText}`);
        }

        const data = await response.json();

        if (data.status === "success" && data.links && data.links.length > 0) {
            // Mostrar la imagen generada
            loadingText.style.display = "none";
            babyImage.src = data.links[0];
            babyImage.style.display = "block";
        } else if (data.status === "processing") {
            // Si sigue procesando, esperar 5 segundos antes de intentarlo de nuevo
            setTimeout(() => pollForResult(fetchUrl), 5000);
        } else {
            throw new Error("Failed to fetch the completed image. Please check the API response.");
        }
    } catch (error) {
        console.error("Error while polling for result:", error);
        resultDiv.innerHTML = `<p>Error while processing: ${error.message}</p>`;
    }
}

// Manejar el envío del formulario
form.addEventListener('submit', async (event) => {
    event.preventDefault();

    const husbandPhoto = document.getElementById('husband').files[0];
    const wifePhoto = document.getElementById('wife').files[0];
    const gender = document.querySelector('input[name="gender"]:checked').value;

    try {
        // Redimensionar y subir imágenes
        const [resizedHusband, resizedWife] = await Promise.all([
            resizeImage(husbandPhoto, 512),
            resizeImage(wifePhoto, 512),
        ]);

        const [husbandUrl, wifeUrl] = await Promise.all([
            uploadToImgBB(resizedHusband),
            uploadToImgBB(resizedWife),
        ]);

        // Construir el prompt dinámico
        const prompt = `A realistic portrait of a ${gender} toddler. blending features of two parents. The ${gender} toddler has round cheeks, soft skin, large bright eyes, a small button nose, and smooth, youthful proportions. The image should be photorealistic, capturing the innocence and playful expression typical of a child of this age`;

        // Enviar URLs al backend
        const response = await fetch(BACKEND_API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                husband_url: husbandUrl,
                wife_url: wifeUrl,
                model_id: "realisticvisionv60b1v60b1",
                prompt: prompt,
            }),
        });

        const data = await response.json();

        if (data.fetch_url) {
            document.getElementById("loading-text").style.display = "block"; // Mostrar texto de carga
            pollForResult(data.fetch_url); // Iniciar polling
        } else {
            alert('Error: No se pudo generar la imagen. ' + (data.error || ''));
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Ocurrió un error. Revisa la consola para más detalles.');
    }
});

// Mostrar vistas previas de las imágenes seleccionadas
document.getElementById('husband').addEventListener('change', (event) => {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = document.getElementById('father-preview');
            img.src = e.target.result;
            img.style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
});

document.getElementById('wife').addEventListener('change', (event) => {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = document.getElementById('mother-preview');
            img.src = e.target.result;
            img.style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
});

    </script>
