    <div id="result">
        <h2>Generated Baby Face:</h2>
        <img id="baby-image" src="" alt="Baby Face" style="display: none;">
    </div>
        
    </div>
     <script>
       const IMGBB_API_KEY = "ba238be3f3764905b1bba03fc7a22e28"; // Your ImgBB API key
        const BACKEND_API_URL = "/generate-baby-face"; // Flask backend endpoint

        const form = document.getElementById('baby-face-form');
        const resultDiv = document.getElementById('result');
        const babyImage = document.getElementById('baby-image');

        async function uploadToImgBB(file) {
            const formData = new FormData();
            formData.append('key', IMGBB_API_KEY);
            formData.append('image', file);

            const response = await fetch('https://api.imgbb.com/1/upload', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const data = await response.json();
                return data.data.url; // Return the uploaded image URL
            } else {
                throw new Error('Failed to upload image to ImgBB');
            }
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const husbandPhoto = document.getElementById('husband').files[0];
            const wifePhoto = document.getElementById('wife').files[0];

            try {
                // Upload both photos to ImgBB
                const [husbandUrl, wifeUrl] = await Promise.all([
                    uploadToImgBB(husbandPhoto),
                    uploadToImgBB(wifePhoto)
                ]);

                console.log("ImgBB URLs:", husbandUrl, wifeUrl);

                // Send URLs to the backend for processing
                const response = await fetch(BACKEND_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ husband_url: husbandUrl, wife_url: wifeUrl })
                });

                const data = await response.json();
                if (data.baby_image_url) {
                    babyImage.src = data.baby_image_url;
                    resultDiv.style.display = 'block';
                } else {
                    alert('Failed to generate baby face.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred.');
            }
        });
    </script>
