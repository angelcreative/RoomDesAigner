         <h1>Baby Face Generator</h1>
    <form id="baby-face-form" enctype="multipart/form-data">
        <label for="husband">Husband's Photo:</label>
        <input type="file" id="husband" name="husband" accept="image/*" required><br><br>

        <label for="wife">Wife's Photo:</label>
        <input type="file" id="wife" name="wife" accept="image/*" required><br><br>

        <button type="submit">Generate Baby Face</button>
    </form>

    <div id="result">
        <h2>Generated Baby Face:</h2>
        <img id="baby-image" src="" alt="Baby Face" style="display: none;">
    </div>
        
    </div>
     <script>
        const form = document.getElementById('baby-face-form');
        const resultDiv = document.getElementById('result');
        const babyImage = document.getElementById('baby-image');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const formData = new FormData(form);

            try {
                const response = await fetch('/generate-baby-face', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.baby_image_url) {
                    babyImage.src = data.baby_image_url;
                    babyImage.style.display = 'block';
                } else {
                    alert('Failed to generate baby face.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred.');
            }
        });
    </script>
